name: Build and Publish

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Run Linting
      run: |
        echo "Linting step - normally npm run lint here"

    - name: Package Extension
      run: |
        zip -r extension.zip extension/ -x "*.git*" "*node_modules*"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chrome-extension-zip
        path: extension.zip

  # The publish job should only run on tagged commits
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/download-artifact@v4
      with:
        name: chrome-extension-zip
        
    - name: Fake Publish Step
      run: |
        echo "Publishing to Chrome Web Store..."
        echo "This would typically use a library like chrome-webstore-upload-cli"
        # npx chrome-webstore-upload-cli@3 upload --source extension.zip --extension-id $EXTENSION_ID --client-id $CLIENT_ID --client-secret $CLIENT_SECRET --refresh-token $REFRESH_TOKEN
